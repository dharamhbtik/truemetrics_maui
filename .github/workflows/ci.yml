name: CI-MAUI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '10.0.x'
  NUGET_OUTPUT: ./artifacts

jobs:
  build-and-publish:
    name: Build, Pack & Publish
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install MAUI workloads
        run: dotnet workload install maui android

      # Compute next version: fetch latest from NuGet, bump patch
      - name: Compute next version
        id: version
        shell: pwsh
        run: |
          $pkg = "TrueMetrics.Maui"
          try {
            $json = Invoke-RestMethod "https://api.nuget.org/v3-flatcontainer/$($pkg.ToLower())/index.json"
            $latest = $json.versions | Where-Object { $_ -notmatch "-" } | Select-Object -Last 1
            if (-not $latest) { $latest = "1.0.1" }
          } catch {
            $latest = "1.0.1"
          }
          $parts = $latest.Split('.')
          $patch = [int]$parts[2] + 1
          $next = "$($parts[0]).$($parts[1]).$patch"
          echo "VERSION=$next" >> $env:GITHUB_OUTPUT
          Write-Host "Latest: $latest  →  Next: $next"

      - name: Restore
        run: dotnet restore TrueMetrics.Maui.sln

      - name: Build binding (Release)
        run: dotnet build src/TrueMetrics.Maui.Android.Binding/TrueMetrics.Maui.Android.Binding.csproj --configuration Release --no-restore

      - name: Build library (Release)
        run: dotnet build src/TrueMetrics.Maui/TrueMetrics.Maui.csproj --configuration Release --no-restore /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Build sample (Release)
        run: dotnet build sample/TrueMetrics.Maui.Sample/TrueMetrics.Maui.Sample.csproj --configuration Release --no-restore -f net10.0-android

      - name: Pack NuGet
        run: >
          dotnet pack src/TrueMetrics.Maui/TrueMetrics.Maui.csproj
          --configuration Release
          --no-build
          --output ${{ env.NUGET_OUTPUT }}
          /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ${{ env.NUGET_OUTPUT }}/*.nupkg

      - name: Upload symbol packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-symbols
          path: ${{ env.NUGET_OUTPUT }}/*.snupkg

      - name: Push to NuGet.org
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: >
          dotnet nuget push ${{ env.NUGET_OUTPUT }}/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Push symbols to NuGet.org
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: >
          dotnet nuget push ${{ env.NUGET_OUTPUT }}/*.snupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: TrueMetrics.Maui v${{ steps.version.outputs.VERSION }}
          body: |
            Automated release of TrueMetrics.Maui v${{ steps.version.outputs.VERSION }}.

            Install via NuGet:
            ```
            dotnet add package TrueMetrics.Maui --version ${{ steps.version.outputs.VERSION }}
            ```
          files: |
            ${{ env.NUGET_OUTPUT }}/*.nupkg
            ${{ env.NUGET_OUTPUT }}/*.snupkg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
