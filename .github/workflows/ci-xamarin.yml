name: CI-Xamarin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  NUGET_OUTPUT: ./artifacts

jobs:
  build-and-publish:
    name: Build, Pack & Publish
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8 (for netstandard2.1 build + nuget CLI)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install NuGet CLI
        run: |
          New-Item -ItemType Directory -Path "$env:TEMP\nuget" -Force | Out-Null
          $nugetPath = "$env:TEMP\nuget\nuget.exe"
          Invoke-WebRequest -Uri "https://dist.nuget.org/win-x86-commandline/latest/nuget.exe" -OutFile $nugetPath
          Add-Content -Path $env:GITHUB_ENV -Value "NUGET_EXE=$nugetPath"

      - name: Compute next version
        id: version
        shell: pwsh
        run: |
          $PKG = "truemetrics.xamarin"
          $response = Invoke-WebRequest -Uri "https://api.nuget.org/v3-flatcontainer/$PKG/index.json" -UseBasicParsing
          $versions = ($response.Content | ConvertFrom-Json).versions | Where-Object { $_ -notmatch '-' }
          $LATEST = if ($versions.Count -gt 0) { $versions[-1] } else { "0.9.9" }
          $parts = $LATEST -split '\.'
          $NEXT = "$($parts[0]).$($parts[1]).$([int]$parts[2] + 1)"
          "VERSION=$NEXT" >> $env:GITHUB_OUTPUT
          "Latest: $LATEST  →  Next: $NEXT"

      # ── 1. Build the Android Binding (msbuild / Xamarin toolchain) ──────────
      - name: Restore binding NuGet packages
        run: |
          & "$env:NUGET_EXE" restore TrueMetrics.Xamarin/src/TrueMetrics.Xamarin.Android.Binding/TrueMetrics.Xamarin.Android.Binding.csproj
        working-directory: TrueMetrics.Xamarin

      - name: Build Android Binding (msbuild Release)
        run: |
          msbuild TrueMetrics.Xamarin/src/TrueMetrics.Xamarin.Android.Binding/TrueMetrics.Xamarin.Android.Binding.csproj `
            /p:Configuration=Release `
            /p:ResolveNuGetPackages=false `
            /t:Build
        working-directory: TrueMetrics.Xamarin

      # ── 2. Build netstandard2.1 wrapper (dotnet build) ──────────────────────
      - name: Build netstandard2.1 wrapper
        run: dotnet build TrueMetrics.Xamarin/src/TrueMetrics.Xamarin/TrueMetrics.Xamarin.csproj --configuration Release
        working-directory: TrueMetrics.Xamarin

      # ── 3. Build Android platform project (msbuild) ─────────────────────────
      - name: Restore Android platform packages
        run: |
          & "$env:NUGET_EXE" restore TrueMetrics.Xamarin/src/TrueMetrics.Xamarin.Android/TrueMetrics.Xamarin.Android.csproj
        working-directory: TrueMetrics.Xamarin

      - name: Build Android platform project (msbuild Release)
        run: |
          msbuild TrueMetrics.Xamarin/src/TrueMetrics.Xamarin.Android/TrueMetrics.Xamarin.Android.csproj `
            /p:Configuration=Release `
            /t:Build
        working-directory: TrueMetrics.Xamarin

      # ── 4. Build iOS stub (msbuild) ─────────────────────────────────────────
      - name: Restore iOS packages
        run: |
          & "$env:NUGET_EXE" restore TrueMetrics.Xamarin/src/TrueMetrics.Xamarin.iOS/TrueMetrics.Xamarin.iOS.csproj -PackagesDirectory packages
        working-directory: TrueMetrics.Xamarin

      - name: Build iOS stub (msbuild Release)
        run: |
          msbuild TrueMetrics.Xamarin/src/TrueMetrics.Xamarin.iOS/TrueMetrics.Xamarin.iOS.csproj `
            /p:Configuration=Release `
            /t:Build
        working-directory: TrueMetrics.Xamarin

      # ── 5. Build sample app (msbuild) ────────────────────────────────────────
      - name: Restore sample packages
        run: |
          & "$env:NUGET_EXE" restore TrueMetrics.Xamarin/sample/TrueMetrics.Xamarin.Sample/TrueMetrics.Xamarin.Sample.csproj
        working-directory: TrueMetrics.Xamarin

      - name: Build sample app (msbuild Release)
        run: |
          msbuild TrueMetrics.Xamarin/sample/TrueMetrics.Xamarin.Sample/TrueMetrics.Xamarin.Sample.csproj `
            /p:Configuration=Release `
            /t:Build
        working-directory: TrueMetrics.Xamarin

      # ── 6. Pack NuGet ────────────────────────────────────────────────────────
      - name: Create artifacts directory
        run: |
          if (-not (Test-Path "${{ env.NUGET_OUTPUT }}")) {
            New-Item -ItemType Directory -Path "${{ env.NUGET_OUTPUT }}" -Force | Out-Null
          }

      - name: Pack NuGet package
        run: |
          & "$env:NUGET_EXE" pack TrueMetrics.Xamarin.nuspec `
            -Version ${{ steps.version.outputs.VERSION }} `
            -OutputDirectory ${{ env.NUGET_OUTPUT }} `
            -NonInteractive
        working-directory: TrueMetrics.Xamarin

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ${{ env.NUGET_OUTPUT }}/*.nupkg

      # ── 7. Publish ───────────────────────────────────────────────────────────
      - name: Push to NuGet.org
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          dotnet nuget push "${{ env.NUGET_OUTPUT }}\*.nupkg" `
            --api-key ${{ secrets.NUGET_API_KEY }} `
            --source https://api.nuget.org/v3/index.json `
            --skip-duplicate

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: TrueMetrics.Xamarin v${{ steps.version.outputs.VERSION }}
          body: |
            Automated release of TrueMetrics.Xamarin v${{ steps.version.outputs.VERSION }}.

            Install via NuGet:
            ```
            Install-Package TrueMetrics.Xamarin -Version ${{ steps.version.outputs.VERSION }}
            ```
          files: ${{ env.NUGET_OUTPUT }}/*.nupkg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
